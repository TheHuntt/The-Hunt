<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hunt // Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="cat-corner">
    <!-- Paste your chosen Lottie/GIF/SVG animation embed code here.
         This div is already positioned top-left and sized by theme.css,
         so whatever you drop in will land in the right spot. -->
  </div>

<div class="wrap">
  <h1>The Hunt</h1>
  <div class="subtitle">a record of who has found what, and when</div>

  <div class="panel" id="authPanel">
    <h2>Sign In</h2>
    <div id="loggedOut">
      <input type="email" id="emailInput" placeholder="you@example.com">
      <button id="sendLinkBtn">Send Login Link</button>
      <div class="msg" id="authMsg"></div>
    </div>
    <div id="loggedIn" style="display:none;">
      <div class="msg ok" id="whoami"></div>
      <div id="nameArea" style="margin-top:12px;"></div>
      <button class="ghost" id="signOutBtn" style="margin-top:12px;">sign out</button>
    </div>
  </div>

  <div class="panel">
    <h2>Puzzles</h2>
    <div id="puzzleList"></div>
  </div>

  <div class="panel">
    <h2>Leaderboard</h2>
    <table>
      <thead><tr><th>#</th><th>Solver</th><th>Stages</th><th>Points</th></tr></thead>
      <tbody id="leaderboardBody"></tbody>
    </table>
  </div>
</div>

<script src="hunt-client.js"></script>
<script>
/* ============================================================
   EDIT THIS LIST as you add puzzles. `unlocksAfter` is the stage
   number that must be completed first — use 0 for the first
   puzzle, so everyone can always reach stage 1.
   ============================================================ */
const PUZZLES = [
  { stage: 1, title: "Key I — The Wounded Soldier", url: "puzzle-1.html", unlocksAfter: 0 },
  // { stage: 2, title: "Key II — ...", url: "puzzle-2.html", unlocksAfter: 1 },
];

/* ============================================================
   Basic name filtering. This is a simple substring blocklist,
   not a comprehensive profanity filter — add more terms here
   any time. It catches obvious cases, not clever workarounds.
   ============================================================ */
const BLOCKED_TERMS = [
  "fuck", "shit", "bitch", "asshole", "cunt", "nigger", "nigga",
  "faggot", "retard", "rape", "admin", "moderator"
];

function isNameAllowed(name){
  const lower = name.toLowerCase();
  return !BLOCKED_TERMS.some(term => lower.includes(term));
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function validateName(name){
  if(name.length < 3) return "Name must be at least 3 characters.";
  if(name.length > 20) return "Name must be 20 characters or fewer.";
  if(!/^[A-Za-z0-9 _\-]+$/.test(name)) return "Only letters, numbers, spaces, - and _ are allowed.";
  if(!isNameAllowed(name)) return "That name isn't allowed — please pick another.";
  return null;
}

let currentProfile = null;

function renderNameArea(editing){
  const area = document.getElementById('nameArea');
  if(currentProfile && currentProfile.display_name && !editing){
    area.innerHTML = `
      <div class="name-display">
        <div class="msg ok">Display name: <b>${escapeHTML(currentProfile.display_name)}</b></div>
        <button class="ghost small" id="editNameBtn">change</button>
      </div>`;
    document.getElementById('editNameBtn').addEventListener('click', () => renderNameArea(true));
  } else {
    const existing = currentProfile && currentProfile.display_name ? currentProfile.display_name : '';
    area.innerHTML = `
      <input type="text" id="nameInput" placeholder="Pick a display name (3–20 characters)" value="${escapeHTML(existing)}">
      <button id="saveNameBtn">Save Name</button>
      <div class="msg" id="nameMsg"></div>`;
    document.getElementById('saveNameBtn').addEventListener('click', submitName);
  }
}

async function submitName(){
  const input = document.getElementById('nameInput');
  const nameMsg = document.getElementById('nameMsg');
  const name = input.value.trim();

  const problem = validateName(name);
  if(problem){
    nameMsg.textContent = problem;
    nameMsg.className = 'msg err';
    return;
  }

  const result = await huntSetDisplayName(name);

  if(result && result.error){
    if(result.error.code === '23505'){
      nameMsg.textContent = 'That name is already taken — try another.';
    } else {
      nameMsg.textContent = 'Something went wrong — try again.';
    }
    nameMsg.className = 'msg err';
    return;
  }

  currentProfile = { display_name: name };
  renderNameArea(false);
  renderPuzzles();
  renderLeaderboard();
}

async function renderAuth(){
  const user = await huntGetUser();
  if(user){
    document.getElementById('loggedOut').style.display = 'none';
    document.getElementById('loggedIn').style.display = 'block';
    document.getElementById('whoami').textContent = `Signed in as ${user.email}`;
    currentProfile = await huntGetProfile();
    renderNameArea(false);
  } else {
    document.getElementById('loggedOut').style.display = 'block';
    document.getElementById('loggedIn').style.display = 'none';
    currentProfile = null;
  }
}

async function renderPuzzles(){
  const list = document.getElementById('puzzleList');

  if(!currentProfile || !currentProfile.display_name){
    list.innerHTML = `<div class="msg">Sign in and set a display name above to unlock puzzles.</div>`;
    return;
  }

  const done = await huntGetProgress();
  list.innerHTML = PUZZLES.map(p => {
    const unlocked = p.unlocksAfter === 0 || done.includes(p.unlocksAfter);
    const solved = done.includes(p.stage);
    if(unlocked){
      return `<div class="puzzle-row">
        <a href="${p.url}">${escapeHTML(p.title)}${solved ? ' ✓' : ''}</a>
      </div>`;
    } else {
      return `<div class="puzzle-row locked">
        <span class="lock-icon">🔒</span> ${escapeHTML(p.title)}
      </div>`;
    }
  }).join('');
}

async function renderLeaderboard(){
  const rows = await huntGetLeaderboard();
  const body = document.getElementById('leaderboardBody');
  body.innerHTML = rows.map((r,i) =>
    `<tr><td>${i+1}</td><td>${escapeHTML(r.name)}</td><td>${r.stages_completed}</td><td>${r.total_points}</td></tr>`
  ).join('') || '<tr><td colspan="4" class="msg">No solves yet — be the first!</td></tr>';
}

document.getElementById('sendLinkBtn').addEventListener('click', async () => {
  const email = document.getElementById('emailInput').value.trim();
  const msg = document.getElementById('authMsg');
  if(!email){ msg.textContent = 'Enter an email first.'; msg.className='msg err'; return; }
  const error = await huntSignIn(email);
  if(error){
    msg.textContent = error.message; msg.className = 'msg err';
  } else {
    msg.textContent = 'Check your email for a login link!'; msg.className = 'msg ok';
  }
});

document.getElementById('signOutBtn').addEventListener('click', async () => {
  await huntSignOut();
  renderAuth();
  renderPuzzles();
});

(async () => {
  await renderAuth();
  await renderPuzzles();
  await renderLeaderboard();
})();
</script>
</body>
</html>
